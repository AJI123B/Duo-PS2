<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duo-PS | Modern Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #141E30, #243B55);
    display: flex;
    flex-direction: column;
    color: #fff;
}

header {
    padding: 25px;
    text-align: center;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 2px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

header span {
    color: #00f5a0;
}

.container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    padding: 40px;
    flex-wrap: wrap;
}

.card {
    width: 300px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    transition: 0.3s ease;
    position: relative;
    overflow: hidden;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 45px rgba(0,0,0,0.6);
}

.card h2 {
    font-weight: 600;
    margin-bottom: 15px;
    font-size: 18px;
    opacity: 0.9;
}

.value {
    font-size: 48px;
    font-weight: 700;
    margin-top: 10px;
}

.status {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.7;
}

.progress-bar {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    margin-top: 15px;
    overflow: hidden;
}

.progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00f5a0, #00d9f5);
    border-radius: 20px;
    transition: width 0.5s ease;
}

footer {
    text-align: center;
    padding: 15px;
    font-size: 13px;
    opacity: 0.6;
    border-top: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>
<body>

<header>
    🚀 Duo-PS <span>Server Dashboard</span>
</header>

<div class="container">

    <div class="card">
        <h2>👥 Players Online</h2>
        <div class="value" id="players">--</div>
        <div class="status" id="playerStatus">Mengambil data...</div>
    </div>

    <div class="card">
        <h2>🖥 CPU Usage</h2>
        <div class="value" id="cpu">--%</div>
        <div class="progress-bar">
            <div class="progress" id="cpuBar"></div>
        </div>
        <div class="status" id="cpuStatus">Mengambil data...</div>
    </div>

</div>

<footer>
    Public API: https://api.gtps.cloud/api/server/public/3835 <br>
    Auto refresh setiap 5 detik
</footer>

<script>
async function loadServerData() {
    try {
        const response = await fetch("https://api.gtps.cloud/api/server/public/3835");
        const data = await response.json();

        // Sesuaikan field jika struktur API berbeda
        const players = data.players || data.online || 0;
        const cpu = data.cpu || data.cpu_usage || 0;

        document.getElementById("players").textContent = players;
        document.getElementById("cpu").textContent = cpu + "%";

        document.getElementById("cpuBar").style.width = cpu + "%";

        document.getElementById("playerStatus").textContent = "Server Online";
        document.getElementById("cpuStatus").textContent = "Realtime CPU Usage";

    } catch (error) {
        document.getElementById("playerStatus").textContent = "Server Offline / API Error";
        document.getElementById("cpuStatus").textContent = "Tidak dapat mengambil data";
        console.error("API Error:", error);
    }
}

loadServerData();
setInterval(loadServerData, 5000);
</script>

</body>
  </html>
